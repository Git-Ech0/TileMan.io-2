<!DOCTYPE html>
<html>
<head>
	<script src="https://tileman-io.vercel.app/tileman.io/swload.js"></script>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<link rel="manifest" href="https://tileman-io.vercel.app/tileman.io/manifest.json">
	<title>TileMan.io</title>
	<meta name="description" content="Play against other players and expand your territory! Try different game modes in this io game!">
	<meta name="robots" content="index, follow">
	<link rel="canonical" href="https://tileman.io">

	<meta property="og:type" content="game">
	<meta property="og:title" content="TileMan.io">
	<meta property="og:description" content="Play against other players and expand your territory! Try different game modes in this io game!">
	<meta property="og:url" content="http://tileman.io">
	<meta property="og:image" content="http://tileman.io/tileman-image2.png">
	<meta name="twitter:card" content="summary_large_image">
	<script type="application/ld+json"></script>

	<!-- Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="./style.css">
	<link rel="icon" href="/favicon.ico">

	<script src="https://tileman-io.vercel.app/tileman.io/socket.io.min.js"></script>
	<script src="https://tileman-io.vercel.app/tileman.io/hammer.min.js"></script>
	<script src="https://tileman-io.vercel.app/tileman.io/fi.min.js"></script>
	<script src="https://tileman-io.vercel.app/tileman.io/chroma.min.js"></script>
	


	<style>
		/* Landing-page exclusive styles */
		#region2 { margin: 10px 0 4px; }
		#mode2   { margin: 4px 0 8px; }

		/* Subtle separator label above region/mode groups */
		.group-label {
			font-family: 'Rajdhani', sans-serif;
			font-size: 0.68em;
			font-weight: 600;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--text-dim, #55556A);
			margin: 14px 0 4px;
		}

		/* Pulse glow on the title on load */
		@keyframes titleIntro {
			0%   { opacity: 0; transform: scale(0.97) translateY(6px); }
			100% { opacity: 1; transform: scale(1)    translateY(0);   }
		}
		h1 { animation: titleIntro 0.6s ease both; }

		/* Stagger the play form in */
		@keyframes fadeUp {
			0%   { opacity: 0; transform: translateY(12px); }
			100% { opacity: 1; transform: translateY(0);    }
		}
		#pcenter > * { animation: fadeUp 0.5s ease both; }
		#pcenter > *:nth-child(1) { animation-delay: 0.05s; }
		#pcenter > *:nth-child(2) { animation-delay: 0.12s; }
		#pcenter > *:nth-child(3) { animation-delay: 0.18s; }
		#pcenter > *:nth-child(4) { animation-delay: 0.24s; }
		#pcenter > *:nth-child(5) { animation-delay: 0.30s; }
		#pcenter > *:nth-child(6) { animation-delay: 0.36s; }
	</style>
</head>
<body>
	<div id=intro>
		<div id=pcenter>
			<h1>TileMan.io</h1>
			<div id="invite-info"></div>

			<div class="group-label">Region</div>
			<div id=region2>
				<button id=rgamerica type=button class=region>America</button>
				<button id=rgeurope  type=button class=region>Europe</button>
				<button id=rgasia    type=button class=region>East Asia</button>
			</div>

			<div class="group-label">Mode</div>
			<div id=mode2>
				<button id=moclassic  type=button class=mode>Classic</button>
				<button id=mofast4x   type=button class=mode>Extreme speed</button>
				<button id=moblind    type=button class=mode>No kills</button>
				<button id=morats     type=button class=mode>Rats</button>
				<button id=moarena    type=button class=mode>Arena</button>
			</div>

			<div id=info></div>

			<form id=playform method=post>
				<input autocomplete="on" id=nick maxlength="20" placeholder="Enter nickname"><br>
				<button id=play autofocus type=button>Play!</button><br>
				<button id=invite type=button>Invite friends — copy link</button>
			</form>

			<div id="links">
				<a href="/leaderboard.html">Leaderboard</a>
				<a href="/settings.html">Settings</a>
			</div>
		</div>
	</div>

	<div id=game style="display:none">
		<canvas id=canvas></canvas>

		<div id=leftbottom class="corner_left">
			<div id=blink_buttons>
				<button id=heart>♡</button>
				<button id=circle>◯</button>
				<button id=skull><img src="https://tileman-io.vercel.app/tileman.io/skull.png"></button>
			</div>
			<div id=player_stats>
				<h3 id=player_name></h3>
				<div><span class=stat_name>Score: </span><span id=score>0</span></div>
				<div><span class=stat_name>Tiles: </span><span id=captured>0</span><span class=plusscore><span id=captcombo></span> <span id=captplus></span></span></div>
				<div><span class=stat_name>Kills: </span><span id=kills>0</span><span class=plusscore><span id=killscombo></span></span></div>
				<div><span class=stat_name>Rank: </span><span id=rank class=notranslate>0</span></div>
			</div>
		</div>

		<div id=leaderboard class=corner>
			<h3>Leaderboard</h3>
			<ol id=leaders class=notranslate></ol>
		</div>

		<div id=timer class=corner>25</div>

		<div id=performance_stats class="corner">
			<div><span class=stat_name></span><span id=regname></span></div>
			<div><span class=stat_name>FPS: </span><span id=fps>0</span></div>
			<div><span class=stat_name>Lag: </span><span id=latency>0</span></div>
			<div style="display:none"><span class=stat_name>To ser: </span><span id=latencytoserver>0</span></div>
		</div>

		<div id=title class="corner anim"></div>

		<!-- WebRTC Spectator Elements are dynamically generated by hra.min.js -->

		<div id=touch>
			<div id=up></div>
			<div id=left></div>
			<div id=right></div>
			<div id=down></div>
			<div id=pause></div>
		</div>
	</div>

	<div id=overlay style="display:none"></div>
	<div id=after style="display:none">
		<div id=after2>
			<h3 id=info2></h3>
			<table border=1 id=local_score2>
				<tr>
					<th></th>
					<th>High score</th>
					<th>Last game</th>
				</tr>
				<tr><td>Tiles</td>      <td id=bh>-</td><td id=bl>-</td></tr>
				<tr><td>Kills</td>      <td id=kh>-</td><td id=kl>-</td></tr>
				<tr><td>Time alive</td> <td id=tih>-</td><td id=til>-</td></tr>
				<tr><td>Snake length</td><td id=trh>-</td><td id=trl>-</td></tr>
			</table>
			<div class=buttons>
				<button id=conti type=button>Continue</button>
				<button id=spect type=button>Hide stats</button>
			</div>
		</div>
	</div>

	<script src="./hra.min.js%253Ffu"></script>
	<script type="module" src="./network-mod.js"></script>
	<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v4513226cdae34746b4dedf0b4dfa099e1781791509496" integrity="sha512-ZE9pZaUXND66v380QUtch/5sE9tPFh2zg45pR2PB0CVkCtOREv2AJKkSidISWkysEuQ0EH8faUU5du78bx87UQ==" data-cf-beacon='{"version":"2024.11.0","token":"87c8ce72d25140bdaedcfe3c7323f022","r":1}' crossorigin="anonymous"></script>
</body>
</html>
